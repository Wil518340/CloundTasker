name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'

jobs:
  
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install dependencies
      run: |
        pip install -r requirements.txt ruff
    - name: Lint
      run: ruff check .
    - name: Test
      run: pytest tests/ -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Build & Push Docker
        run: |
          IMAGE=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloudtasker/cloudtasker:latest
          gcloud auth configure-docker us-central1-docker.pkg.dev
          docker build -t $IMAGE .
          docker push $IMAGE
      - name: Debug GCP Auth
        run: |
          echo "Active gcloud accounts:"
          gcloud auth list

          echo "Access token preview:"
          gcloud auth print-access-token | head -c 50

          echo ""
          echo "Docker credential config:"
          cat ~/.docker/config.json
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy cloudtasker \
            --image=us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloudtasker/cloudtasker:latest \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}